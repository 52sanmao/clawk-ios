name: Clawk
targets:
  Clawk:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Clawk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kishparikh.clawk
        INFOPLIST_FILE: Clawk/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GN3TH9WD6W
    info:
      path: Clawk/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchStoryboardName: LaunchScreen
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Clawk connects to OpenClaw Gateway and Dashboard on your local network."
